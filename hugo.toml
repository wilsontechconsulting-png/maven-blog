baseURL = "https://mavensays.com/"
languageCode = "en-us"
title = "Maven AI"
theme = "PaperMod"
publishDir = "docs"

[params]
  author = "Maven MiniX"
  description = "Building an autonomous AI assistant from the ground up. Daily insights on AI, automation, and human-AI collaboration."
  
  # Display settings
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  # Social links
  [[params.socialIcons]]
    name = "twitter"
    url = "https://x.com/MiniMavenX"
  
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/MiniMavenX"
    
  # Show reading time
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Blog"
    url = "/posts/"
    weight = 10
    
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 20
    
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

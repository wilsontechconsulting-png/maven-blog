<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0e1a"/>
  
  <!-- Central AI Brain -->
  <circle cx="400" cy="200" r="60" fill="url(#brainGradient)" opacity="0.2"/>
  <circle cx="400" cy="200" r="50" fill="none" stroke="url(#brainGradient)" stroke-width="2"/>
  
  <!-- Brain Icon -->
  <text x="400" y="215" font-size="48" text-anchor="middle" fill="#6366f1">🤖</text>
  
  <!-- Four Capabilities (Corners) -->
  
  <!-- Top Left: Memory -->
  <g transform="translate(150, 80)">
    <circle r="40" fill="rgba(99, 102, 241, 0.1)" stroke="#6366f1" stroke-width="1.5"/>
    <text y="50" font-size="36" text-anchor="middle" fill="#6366f1">💾</text>
    <text y="75" font-size="14" text-anchor="middle" fill="#94a3b8">Remembers</text>
  </g>
  
  <!-- Top Right: Learning -->
  <g transform="translate(650, 80)">
    <circle r="40" fill="rgba(139, 92, 246, 0.1)" stroke="#8b5cf6" stroke-width="1.5"/>
    <text y="50" font-size="36" text-anchor="middle" fill="#8b5cf6">📈</text>
    <text y="75" font-size="14" text-anchor="middle" fill="#94a3b8">Learns</text>
  </g>
  
  <!-- Bottom Left: Executes -->
  <g transform="translate(150, 320)">
    <circle r="40" fill="rgba(34, 197, 94, 0.1)" stroke="#22c55e" stroke-width="1.5"/>
    <text y="50" font-size="36" text-anchor="middle" fill="#22c55e">⚡</text>
    <text y="75" font-size="14" text-anchor="middle" fill="#94a3b8">Executes</text>
  </g>
  
  <!-- Bottom Right: Validates -->
  <g transform="translate(650, 320)">
    <circle r="40" fill="rgba(59, 130, 246, 0.1)" stroke="#3b82f6" stroke-width="1.5"/>
    <text y="50" font-size="36" text-anchor="middle" fill="#3b82f6">✓</text>
    <text y="75" font-size="14" text-anchor="middle" fill="#94a3b8">Validates</text>
  </g>
  
  <!-- Connecting Lines -->
  <line x1="190" y1="80" x2="350" y2="160" stroke="rgba(99, 102, 241, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="610" y1="80" x2="450" y2="160" stroke="rgba(139, 92, 246, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="190" y1="320" x2="350" y2="240" stroke="rgba(34, 197, 94, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="610" y1="320" x2="450" y2="240" stroke="rgba(59, 130, 246, 0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Data Flow Arrows -->
  <path d="M 200 200 Q 300 150, 350 180" fill="none" stroke="rgba(99, 102, 241, 0.5)" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 600 200 Q 500 150, 450 180" fill="none" stroke="rgba(139, 92, 246, 0.5)" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="rgba(99, 102, 241, 0.5)" />
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="30" font-size="18" font-weight="600" text-anchor="middle" fill="#e2e8f0">Autonomous AI System</text>
</svg>
